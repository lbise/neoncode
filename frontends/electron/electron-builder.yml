appId: dev.neoncode.desktop
productName: NeonCode Alpha
copyright: Copyright © 2026 NeonCode contributors
asar: true
compression: maximum
afterPack: build/after-pack.cjs
directories:
  output: ../../release/windows-alpha
  buildResources: build
files:
  - from: dist
    to: dist
    filter:
      - "**/*"
  - index.html
  - styles.css
  - package.json
extraResources:
  - from: resources/hub/linux-x64/neoncode-hub
    to: hub/linux-x64/neoncode-hub
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
    - target: zip
      arch:
        - x64
  executableName: NeonCode
  verifyUpdateCodeSignature: true
portable:
  artifactName: "${productName}-${version}-alpha-portable-${arch}.${ext}"
nsis:
  artifactName: "${productName}-${version}-alpha-installer-${arch}.${ext}"
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: NeonCode Alpha
  uninstallDisplayName: NeonCode Alpha
publish: null
