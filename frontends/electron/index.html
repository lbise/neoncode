<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src ws://127.0.0.1:*; font-src 'self' data:; img-src 'self' data:" />
  <title>NeonCode</title>
  <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header data-testid="app-header">
    <div>
      <strong>NeonCode</strong>
      <span>Workspace/session cockpit</span>
    </div>
    <div class="header-statuses">
      <div id="configuration-status" class="configuration-status" data-state="ready" data-testid="configuration-status"></div>
      <div id="status" class="status" data-testid="hub-status">Connecting to neoncode-hub...</div>
    </div>
  </header>
  <div class="workspace-shell">
    <aside class="workspace-sidebar" aria-label="Workspaces">
      <div class="workspace-sidebar-title">Workspaces</div>
      <nav id="workspace-list" class="workspace-list" data-testid="workspace-list"></nav>
    </aside>
    <main id="terminal-grid" aria-label="xterm terminal region" data-testid="terminal-grid"></main>
  </div>
  <script src="renderer.bundle.js"></script>
</body>
</html>
