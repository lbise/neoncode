<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src ws://127.0.0.1:*; font-src 'self' data:; img-src 'self' data:" />
  <title>NeonCode</title>
  <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header data-testid="app-header">
    <div>
      <strong>NeonCode</strong>
      <span>Workspace/session cockpit</span>
    </div>
    <div class="header-controls">
      <button id="commands-button" class="commands-button" type="button" aria-haspopup="dialog" aria-controls="command-palette" aria-expanded="false" data-testid="commands-button">
        <span>Commands</span>
        <kbd>Ctrl+Shift+P</kbd>
      </button>
      <div class="header-statuses">
        <div id="configuration-status" class="configuration-status" data-state="ready" data-testid="configuration-status"></div>
        <div id="status" class="status" data-testid="hub-status">Connecting to neoncode-hub...</div>
      </div>
    </div>
  </header>
  <div class="workspace-shell">
    <aside class="workspace-sidebar" aria-label="Workspaces">
      <div class="workspace-sidebar-title">Workspaces</div>
      <nav id="workspace-list" class="workspace-list" data-testid="workspace-list"></nav>
    </aside>
    <main id="terminal-grid" aria-label="xterm terminal region" data-testid="terminal-grid"></main>
  </div>
  <div id="command-palette-overlay" class="command-palette-overlay" data-testid="command-palette-overlay" hidden>
    <section id="command-palette" class="command-palette" role="dialog" aria-modal="true" aria-labelledby="command-palette-title">
      <div class="command-palette-header">
        <h2 id="command-palette-title">Commands</h2>
        <button id="command-palette-close" class="command-palette-close" type="button" aria-label="Close command palette" title="Close command palette (Escape)" data-testid="command-palette-close">Close</button>
      </div>
      <label class="command-palette-search-label" for="command-palette-input">Search commands</label>
      <input id="command-palette-input" class="command-palette-input" type="search" autocomplete="off" spellcheck="false" role="combobox" aria-autocomplete="list" aria-expanded="true" aria-controls="command-palette-results" data-testid="command-palette-input" />
      <div id="command-palette-results" class="command-palette-results" role="listbox" aria-label="Matching commands" data-testid="command-palette-results"></div>
      <p id="command-palette-empty" class="command-palette-empty" role="status" hidden>No matching commands</p>
    </section>
  </div>
  <script src="dist/renderer.bundle.js"></script>
</body>
</html>
