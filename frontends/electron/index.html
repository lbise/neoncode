<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src ws://127.0.0.1:*; font-src 'self' data:; img-src 'self' data:" />
  <title>NeonCode</title>
  <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header data-testid="app-header">
    <div>
      <strong>NeonCode</strong>
      <span>Workspace/session cockpit</span>
    </div>
    <div id="status" class="status" data-testid="hub-status">Connecting to neoncode-hub...</div>
  </header>
  <main id="terminal-grid" aria-label="xterm terminal region" data-testid="terminal-grid">
    <section class="terminal-pane" data-testid="terminal-pane-1">
      <div class="pane-title">
        <span>Shell</span>
        <span id="pane-status-1" class="pane-status" data-state="connecting" data-testid="pane-status-shell">Connecting</span>
      </div>
      <div id="terminal-1" class="terminal" data-testid="terminal-1"></div>
    </section>
    <section class="terminal-pane" data-testid="terminal-pane-2">
      <div class="pane-title">
        <span>Tasks</span>
        <span id="pane-status-2" class="pane-status" data-state="connecting" data-testid="pane-status-tasks">Connecting</span>
      </div>
      <div id="terminal-2" class="terminal" data-testid="terminal-2"></div>
    </section>
  </main>
  <script src="renderer.bundle.js"></script>
</body>
</html>
